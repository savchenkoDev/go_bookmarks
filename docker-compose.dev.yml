services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3030:3030"
    volumes:
      - .:/app
    environment:
      APP_PORT: "3030"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/postgres?sslmode=disable"
      JWT_SECRET: "dev-secret"
      LOG_LEVEL: "debug"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  app:
  postgres_data:
  redis_data: